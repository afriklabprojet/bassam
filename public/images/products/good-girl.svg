  <!-- Bottom label -->
  <text x="400" y="920" text-anchor="middle" fill="#A89B7A" font-size="16" font-family="Arial, sans-serif" letter-spacing="2" font-weight="600">CAROLINA HERRERA</text>
  <text x="400" y="950" text-anchor="middle" fill="#999" font-size="14" font-family="Arial, sans-serif">80ml · Eau de Parfum</text>
  <text x="400" y="1030" text-anchor="middle" fill="#C5A55A" font-size="24" font-family="Arial, sans-serif" font-weight="700">92 000 FCFA</text>
  <defs>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#C5A55A" stop-opacity="0.12"/>
