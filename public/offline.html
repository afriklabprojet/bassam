<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne - VIP Parfumerie Bar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #4A5FFF 0%, #F5E84D 50%, #FF9F45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #4A5FFF 0%, #F5E84D 50%, #FF9F45 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    
    h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 16px;
      font-weight: 900;
    }
    
    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #4A5FFF 0%, #F5E84D 50%, #FF9F45 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 95, 255, 0.4);
    }
    
    .offline-message {
      background: #f0f0f0;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📶
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>
      Impossible de se connecter à VIP Parfumerie Bar pour le moment. 
      Vérifiez votre connexion Internet et réessayez.
    </p>
    <button class="button" onclick="window.location.reload()">
      Réessayer
    </button>
    <div class="offline-message">
      💡 <strong>Astuce :</strong> Les pages que vous avez déjà visitées sont accessibles hors ligne.
    </div>
  </div>
  
  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
