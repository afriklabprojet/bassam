  <line x1="300" y1="540" x2="500" y2="540" stroke="#C5A55A" stroke-width="0.5"/>
  <!-- Brand text -->
  <text x="400" y="465" text-anchor="middle" fill="#C5A55A" font-size="22" font-family="Georgia, serif" letter-spacing="6">TOM FORD</text>
  <text x="400" y="505" text-anchor="middle" fill="#D4C4A0" font-size="16" font-family="Georgia, serif" letter-spacing="3">OUD WOOD</text>
  <!-- Bottom label -->
