  <!-- Cap highlight -->
  <rect x="350" y="240" width="30" height="60" rx="2" fill="#D4AF60" opacity="0.5"/>
  <!-- Neck -->
  <rect x="370" y="280" width="60" height="25" fill="#2C1810"/>
  <!-- Glass reflection -->
  <rect x="290" y="315" width="18" height="340" rx="3" fill="white" opacity="0.06"/>
