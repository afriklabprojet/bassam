<svg width="800" height="1067" viewBox="0 0 800 1067" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1067" fill="#F5F3EE"/>
  <circle cx="400" cy="480" r="260" fill="url(#glow8)" opacity="0.3"/>
  <!-- Elegant rectangular bottle -->
  <rect x="295" y="300" width="210" height="380" rx="4" fill="#FFF8F0"/>
  <rect x="295" y="300" width="210" height="380" rx="4" stroke="#E8D8C0" stroke-width="2"/>
  <!-- Inner liquid -->
  <rect x="300" y="420" width="200" height="255" rx="2" fill="#F5E8D0" opacity="0.5"/>
  <!-- Glass reflection -->
  <rect x="305" y="310" width="18" height="350" rx="3" fill="white" opacity="0.4"/>
  <!-- Black band -->
  <rect x="295" y="380" width="210" height="45" fill="#111111"/>
  <!-- CC logo on band -->
  <text x="400" y="410" text-anchor="middle" fill="white" font-size="22" font-family="Georgia, serif" letter-spacing="6" font-weight="700">CHANEL</text>
  <!-- Cap - faceted -->
  <rect x="340" y="225" width="120" height="85" rx="2" fill="#111111"/>
  <rect x="340" y="225" width="120" height="85" rx="2" stroke="#333" stroke-width="1"/>
  <!-- Cap reflection -->
  <rect x="348" y="233" width="20" height="70" rx="2" fill="white" opacity="0.08"/>
  <!-- Neck -->
  <rect x="365" y="280" width="70" height="25" fill="#FFF8F0" stroke="#E8D8C0" stroke-width="1"/>
  <!-- Spray nozzle -->
  <rect x="388" y="270" width="24" height="15" rx="3" fill="#C0C0C0"/>
  <!-- Brand text below -->
  <text x="400" y="510" text-anchor="middle" fill="#333" font-size="14" font-family="Georgia, serif" letter-spacing="3" font-style="italic">COCO</text>
  <text x="400" y="535" text-anchor="middle" fill="#333" font-size="12" font-family="Georgia, serif" letter-spacing="3">MADEMOISELLE</text>
  <!-- Bottom label -->
  <text x="400" y="920" text-anchor="middle" fill="#A89B7A" font-size="16" font-family="Arial, sans-serif" letter-spacing="2" font-weight="600">CHANEL</text>
  <text x="400" y="950" text-anchor="middle" fill="#999" font-size="14" font-family="Arial, sans-serif">100ml · Eau de Parfum</text>
  <text x="400" y="1030" text-anchor="middle" fill="#C5A55A" font-size="24" font-family="Arial, sans-serif" font-weight="700">115 000 FCFA</text>
  <defs>
    <radialGradient id="glow8" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#C5A55A" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F5F3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>