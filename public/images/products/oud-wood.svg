  <rect x="280" y="300" width="240" height="380" rx="4" fill="#2C1810"/>
  <rect x="280" y="300" width="240" height="380" rx="4" stroke="#4A3020" stroke-width="2"/>
  <!-- Gold cap -->
  <rect x="340" y="230" width="120" height="80" rx="2" fill="#B8963E"/>
