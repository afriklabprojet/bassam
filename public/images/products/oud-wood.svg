  <text x="400" y="950" text-anchor="middle" fill="#999" font-size="14" font-family="Arial, sans-serif">100ml · Eau de Parfum</text>
  <text x="400" y="1030" text-anchor="middle" fill="#C5A55A" font-size="24" font-family="Arial, sans-serif" font-weight="700">185 000 FCFA</text>
  <defs>
